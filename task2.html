<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognifyz Level 1 Task 2 | Nitin Lahane</title>

    <!-- CSS -->
    <link rel="stylesheet" href="task2.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<!-- ================= HEADER ================= -->

<header>

    <h2>Nitin Lahane</h2>

    <nav>

        <a href="#home">Home</a>
        <a href="#calculator">Calculator</a>
        <a href="#contact">Contact</a>

    </nav>

</header>


<!-- ================= HERO ================= -->

<section id="home" class="hero">

<div class="hero-text">

<h1>JavaScript Task 2</h1>

<h2 id="typing"></h2>

<p>

This project demonstrates JavaScript concepts including
dynamic buttons, live clock, calculator and contact form validation.

</p>

<button id="colorBtn">
Change Button Color
</button>

</div>

<div class="hero-image">

<img src="profile.png" alt="Developer">

</div>

</section>


<!-- ================= LIVE CLOCK ================= -->

<section class="clock-section">

<h2>Current Date & Time</h2>

<div id="clock"></div>

</section>


<!-- ================= CALCULATOR ================= -->

<section id="calculator">

<h2>Basic Calculator</h2>

<div class="calculator">

<input
type="number"
id="num1"
placeholder="First Number">

<input
type="number"
id="num2"
placeholder="Second Number">

<div class="buttons">

<button onclick="calculate('+')">+</button>

<button onclick="calculate('-')">-</button>

<button onclick="calculate('*')">*</button>

<button onclick="calculate('/')">/</button>

</div>

<h3 id="result">

Result : 0

</h3>

</div>

</section>


<!-- ================= CONTACT ================= -->

<section id="contact">

<h2>Contact Form</h2>

<form id="contactForm">

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="email"
id="email"
placeholder="Email Address">

<textarea
id="message"
rows="6"
placeholder="Write Message"></textarea>

<button type="submit">

Submit

</button>

</form>

</section>


<!-- ================= FOOTER ================= -->

<footer>

<p>

Designed by Nitin Lahane

</p>

<div class="icons">

<i class="fab fa-github"></i>

<i class="fab fa-linkedin"></i>

<i class="fas fa-envelope"></i>

</div>

</footer>

<!-- JavaScript -->

<script src="task2.js"></script>

</body>
</html>
